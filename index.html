<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>재난·안전 현황 검색 대시보드</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --brand: #1d4ed8;
      --brand-soft: #dbeafe;
      --border: #e5e7eb;
      --danger: #dc2626;
      --safe: #047857;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: white;
      padding: 34px 20px;
    }
    .wrap { max-width: 1180px; margin: 0 auto; }
    .hero { display: flex; justify-content: space-between; gap: 18px; align-items: flex-end; flex-wrap: wrap; }
    h1 { margin: 0 0 10px; font-size: clamp(26px, 4vw, 42px); letter-spacing: -0.04em; }
    .subtitle { margin: 0; color: rgba(255,255,255,0.86); }
    .kpi-row { display: grid; grid-template-columns: repeat(3, minmax(160px, 1fr)); gap: 14px; margin-top: 22px; }
    .kpi { background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.24); border-radius: 18px; padding: 16px; }
    .kpi strong { display: block; font-size: 26px; }
    .kpi span { color: rgba(255,255,255,0.82); font-size: 14px; }
    main { padding: 24px 20px 44px; }
    .grid { display: grid; grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr); gap: 20px; align-items: start; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 22px; padding: 20px; box-shadow: var(--shadow); }
    .panel h2 { margin: 0 0 14px; font-size: 20px; letter-spacing: -0.02em; }
    .filters { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; margin-bottom: 14px; }
    select, button { border: 1px solid var(--border); border-radius: 12px; padding: 11px 12px; font-size: 15px; background: white; }
    button { background: var(--brand); color: white; border-color: var(--brand); cursor: pointer; font-weight: 700; }
    .result-count { font-weight: 700; margin-bottom: 12px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; max-height: 660px; overflow: auto; padding-right: 4px; }
    .card { border: 1px solid var(--border); border-radius: 18px; padding: 15px; background: #fff; }
    .card-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 10px; }
    .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 9px; font-size: 12px; font-weight: 700; background: var(--brand-soft); color: #1e40af; }
    .date { color: var(--muted); font-size: 13px; }
    .card h3 { margin: 0 0 8px; font-size: 18px; }
    .meta { display: grid; grid-template-columns: 86px 1fr; gap: 4px 8px; font-size: 14px; }
    .meta span:nth-child(odd) { color: var(--muted); }
    .damage { color: var(--danger); font-weight: 800; }
    .summary-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .summary-table th, .summary-table td { border-bottom: 1px solid var(--border); padding: 9px 6px; text-align: left; white-space: nowrap; }
    .summary-table th { color: var(--muted); font-size: 13px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 10px; }
    .tab-btn { background: #f3f4f6; color: var(--text); border-color: var(--border); padding: 8px 10px; font-size: 13px; }
    .tab-btn.active { background: var(--brand); color: white; }
    .rss-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; }
    .rss-list li { border: 1px solid var(--border); border-radius: 14px; padding: 12px; }
    .rss-list a { color: var(--brand); font-weight: 700; text-decoration: none; }
    .rss-list small { display: block; color: var(--muted); margin-top: 4px; }
    .notice { margin-top: 10px; font-size: 13px; color: var(--muted); }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .kpi-row { grid-template-columns: 1fr; }
      .filters { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap hero">
      <div>
        <h1>재난·안전 현황 검색 대시보드</h1>
        <p class="subtitle">재난 발생 현황과 안전시설 현황을 시민이 한눈에 확인할 수 있는 정적 웹 페이지입니다.</p>
      </div>
    </div>
    <div class="wrap kpi-row" aria-label="핵심 지표">
      <div class="kpi"><strong id="totalDisasters">-</strong><span>총 재난 사건</span></div>
      <div class="kpi"><strong id="totalFacilities">-</strong><span>총 안전시설</span></div>
      <div class="kpi"><strong id="totalCapacity">-</strong><span>총 수용인원</span></div>
    </div>
  </header>

  <main class="wrap">
    <div class="grid">
      <section class="panel" aria-labelledby="searchTitle">
        <h2 id="searchTitle">재난 사건 검색</h2>
        <div class="filters">
          <label>
            <span class="sr-only">재난유형</span>
            <select id="typeFilter" aria-label="재난유형 필터">
              <option value="">전체 재난유형</option>
              <option value="산사태">산사태</option><option value="지진">지진</option><option value="태풍">태풍</option><option value="폭설">폭설</option><option value="폭염">폭염</option><option value="한파">한파</option><option value="홍수">홍수</option><option value="화재">화재</option>
            </select>
          </label>
          <label>
            <span class="sr-only">발생지역</span>
            <select id="regionFilter" aria-label="발생지역 필터">
              <option value="">전체 발생지역</option>
              <option value="강원">강원</option><option value="경기">경기</option><option value="경남">경남</option><option value="경북">경북</option><option value="광주">광주</option><option value="대구">대구</option><option value="대전">대전</option><option value="부산">부산</option><option value="서울">서울</option><option value="울산">울산</option><option value="인천">인천</option><option value="전남">전남</option><option value="전북">전북</option><option value="제주">제주</option><option value="충남">충남</option><option value="충북">충북</option>
            </select>
          </label>
          <button type="button" id="resetBtn">초기화</button>
        </div>
        <div class="result-count" id="resultCount">결과 0건</div>
        <div class="cards" id="cards"></div>
      </section>

      <aside class="panel" aria-labelledby="facilityTitle">
        <h2 id="facilityTitle">안전시설 현황 요약</h2>
        <div class="tabs" role="tablist">
          <button type="button" class="tab-btn active" data-tab="region">지역별</button>
          <button type="button" class="tab-btn" data-tab="type">시설유형별</button>
        </div>
        <div id="facilitySummary"></div>
      </aside>
    </div>

    <section class="panel" style="margin-top:20px" aria-labelledby="rssTitle">
      <h2 id="rssTitle">korea.kr 정책뉴스 RSS 최신 항목</h2>
      <ul class="rss-list" id="rssList"><li>RSS 최신 항목을 불러오는 중입니다.</li></ul>
      <p class="notice">사용 RSS: <a href="https://www.korea.kr/rss/policy.xml" target="_blank" rel="noopener">https://www.korea.kr/rss/policy.xml</a></p>
    </section>
  </main>

    const facilityByType = [{"시설유형": "재난대피센터", "시설수": 27, "총수용인원": 13462, "운영지역수": 14, "최다점검등급": "B"}, {"시설유형": "소방서", "시설수": 23, "총수용인원": 11618, "운영지역수": 14, "최다점검등급": "B"}, {"시설유형": "대피소", "시설수": 21, "총수용인원": 10135, "운영지역수": 13, "최다점검등급": "B"}, {"시설유형": "응급센터", "시설수": 19, "총수용인원": 7923, "운영지역수": 12, "최다점검등급": "A"}, {"시설유형": "구조대", "시설수": 10, "총수용인원": 5004, "운영지역수": 7, "최다점검등급": "A"}];
    const rssUrl = "https://www.korea.kr/rss/policy.xml";

    const numberFormat = new Intl.NumberFormat('ko-KR');
    const cards = document.getElementById('cards');
    const resultCount = document.getElementById('resultCount');
    const typeFilter = document.getElementById('typeFilter');
    const regionFilter = document.getElementById('regionFilter');

    document.getElementById('totalDisasters').textContent = numberFormat.format(disasters.length) + '건';
    document.getElementById('totalFacilities').textContent = numberFormat.format(facilityByRegion.reduce((sum, row) => sum + row.시설수, 0)) + '개';
    document.getElementById('totalCapacity').textContent = numberFormat.format(facilityByRegion.reduce((sum, row) => sum + row.총수용인원, 0)) + '명';

    function renderCards() {
      const selectedType = typeFilter.value;
      const selectedRegion = regionFilter.value;
      const filtered = disasters.filter(row =>
        (!selectedType || row.재난유형 === selectedType) &&
        (!selectedRegion || row.발생지역 === selectedRegion)
      );
      resultCount.textContent = `결과 ${numberFormat.format(filtered.length)}건`;
      cards.innerHTML = filtered.map(row => `
        <article class="card">
          <div class="card-top">
            <span class="badge">${escapeHtml(row.재난유형)}</span>
            <span class="date">${escapeHtml(row.발생일자)}</span>
          </div>
          <h3>${escapeHtml(row.발생지역)} 재난 발생</h3>
          <div class="meta">
            <span>발생일자</span><span>${escapeHtml(row.발생일자)}</span>

          </div>
        </article>
      `).join('');
    }

    function renderFacilitySummary(mode = 'region') {
      const target = document.getElementById('facilitySummary');
      const rows = mode === 'region' ? facilityByRegion : facilityByType;
      const head = mode === 'region'
        ? ['지역', '시설수', '총수용인원', '주요시설유형', '최다점검등급']
        : ['시설유형', '시설수', '총수용인원', '운영지역수', '최다점검등급'];
      target.innerHTML = `
        <table class="summary-table">
          <thead><tr>${head.map(h => `<th>${h}</th>`).join('')}</tr></thead>
          <tbody>
            ${rows.map(row => `<tr>${head.map(h => `<td>${formatCell(row[h])}</td>`).join('')}</tr>`).join('')}
          </tbody>
        </table>
      `;
    }

    function formatCell(value) {
      return typeof value === 'number' ? numberFormat.format(value) : escapeHtml(String(value ?? ''));
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>'"]/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[char]));
    }

    async function loadRss() {
      const rssList = document.getElementById('rssList');
      const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(rssUrl)}`;
      try {
        const response = await fetch(proxyUrl);
        if (!response.ok) throw new Error('RSS 응답 오류');
        const xmlText = await response.text();
        const xml = new DOMParser().parseFromString(xmlText, 'application/xml');
        const items = Array.from(xml.querySelectorAll('item')).slice(0, 5);
        if (!items.length) throw new Error('RSS 항목 없음');
        rssList.innerHTML = items.map(item => {
          const title = item.querySelector('title')?.textContent || '제목 없음';
          const link = item.querySelector('link')?.textContent || rssUrl;
          const pubDate = item.querySelector('pubDate')?.textContent || '';
          return `<li><a href="${escapeHtml(link)}" target="_blank" rel="noopener">${escapeHtml(title)}</a><small>${escapeHtml(pubDate)}</small></li>`;
        }).join('');
      } catch (error) {
        rssList.innerHTML = `
          <li><a href="https://www.korea.kr/news/policyNewsList.do" target="_blank" rel="noopener">정책뉴스 최신 목록 바로가기</a><small>네트워크 또는 CORS 정책으로 RSS 자동 표시가 제한되었습니다.</small></li>
          <li><a href="https://www.korea.kr/rss/policy.xml" target="_blank" rel="noopener">korea.kr 정책뉴스 RSS 원문 열기</a><small>공식 RSS 피드에서 최신 항목을 확인할 수 있습니다.</small></li>
          <li><a href="https://www.korea.kr/rss/pressrelease.xml" target="_blank" rel="noopener">보도자료 RSS 원문 열기</a><small>정부부처 보도자료 RSS입니다.</small></li>
          <li><a href="https://www.korea.kr/rss/fact.xml" target="_blank" rel="noopener">사실은 이렇습니다 RSS 원문 열기</a><small>정책 확인 자료 RSS입니다.</small></li>
          <li><a href="https://www.korea.kr/etc/rss.do" target="_blank" rel="noopener">korea.kr RSS 서비스 안내</a><small>전체 RSS 목록을 확인할 수 있습니다.</small></li>
        `;
      }
    }

    typeFilter.addEventListener('change', renderCards);
    regionFilter.addEventListener('change', renderCards);
    document.getElementById('resetBtn').addEventListener('click', () => {
      typeFilter.value = '';
      regionFilter.value = '';

    document.querySelectorAll('.tab-btn').forEach(btn => {

        renderFacilitySummary(btn.dataset.tab);
      });
    });

    renderCards();
    renderFacilitySummary('region');
    loadRss();
